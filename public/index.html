<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Postype Translator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #fff;
      color: #111;
      font-size: 15px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid #111;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      margin: 0 0 8px;
    }
    input[type="url"], textarea {
      width: 100%;
      padding: 12px 14px;
      font: inherit;
      color: #111;
      background: #fff;
      border: 1px solid #111;
      border-radius: 0;
      outline: none;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="url"]:focus, textarea:focus {
      outline: 2px solid #111;
      outline-offset: -2px;
    }
    textarea {
      height: 480px;
      resize: vertical;
      white-space: pre-wrap;
      font-family: inherit;
    }
    .field { margin-bottom: 24px; }
    .actions {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
    }
    button {
      flex: 0 0 auto;
      padding: 12px 24px;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid #111;
      border-radius: 0;
      cursor: pointer;
      background: #111;
      color: #fff;
      transition: background 0.1s, color 0.1s;
    }
    button + button { margin-left: -1px; }
    button.secondary { background: #fff; color: #111; }
    button:hover:not(:disabled) { background: #444; color: #fff; }
    button.secondary:hover:not(:disabled) { background: #111; color: #fff; }
    button:disabled {
      background: #fff;
      color: #999;
      border-color: #ccc;
      cursor: not-allowed;
    }
    .panel {
      border: 1px solid #111;
      padding: 16px;
      margin-bottom: 24px;
      background: #fafafa;
      display: none;
    }
    .panel.active { display: block; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .panel-head .count {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }
    .bar {
      width: 100%;
      height: 10px;
      background: #e6e6e6;
      position: relative;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: #111;
      width: 0%;
      transition: width 0.25s linear;
    }
    .error {
      border: 1px solid #c00;
      padding: 12px 14px;
      margin-bottom: 24px;
      color: #c00;
      font-weight: 600;
      background: #fff;
      display: none;
    }
    .error.active { display: block; }
    .notice {
      border: 1px solid #0a6;
      padding: 12px 14px;
      margin-bottom: 24px;
      color: #084;
      background: #f4fffb;
      display: none;
    }
    .notice.active { display: block; }
    .tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid #111;
    }
    .tab {
      padding: 12px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #666;
      transition: color 0.1s, border-color 0.1s;
    }
    .tab.active {
      color: #111;
      border-bottom-color: #111;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Postype Translator</h1>

    <div class="tabs">
      <button class="tab active" data-tab="url">URL</button>
      <button class="tab" data-tab="manual">手动输入</button>
      <button class="tab" data-tab="file">文件上传</button>
    </div>

    <div id="url-tab" class="tab-content active">
      <div class="field">
        <label for="url">原文 URL</label>
        <input id="url" type="url" placeholder="https://..." autocomplete="off" />
      </div>
    </div>

    <div id="manual-tab" class="tab-content">
      <div class="field">
        <label for="manual-html">韩文正文</label>
        <textarea id="manual-html" placeholder="粘贴韩文小说正文"></textarea>
      </div>
    </div>

    <div id="file-tab" class="tab-content">
      <div class="field">
        <label for="file-html">Postype HTML 或 WebArchive</label>
        <input id="file-html" type="file" accept=".html,.htm,.webarchive" />
      </div>
    </div>

    <div class="actions">
      <button id="btn-translate" type="button">翻译</button>
      <button id="btn-download" class="secondary" type="button">导出 TXT</button>
    </div>

    <div id="error" class="error" role="alert"></div>
    <div id="notice" class="notice" role="status"></div>

    <div id="progress" class="panel" aria-live="polite">
      <div class="panel-head">
        <span id="progress-label">准备中</span>
        <span class="count"><span id="progress-done">0</span> / <span id="progress-total">0</span></span>
      </div>
      <div class="bar"><div id="progress-fill" class="bar-fill"></div></div>
    </div>

    <div class="field">
      <label for="output">译文</label>
      <textarea id="output" placeholder="译文会显示在这里"></textarea>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function setProgress(label, done, total) {
      $("progress-label").textContent = label;
      $("progress-done").textContent = String(done);
      $("progress-total").textContent = String(total);
      const pct = total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0;
      $("progress-fill").style.width = pct + "%";
    }

    function showError(msg) {
      const e = $("error");
      e.textContent = "错误：" + msg;
      e.classList.add("active");
    }

    function clearError() {
      $("error").classList.remove("active");
    }

    function setBusy(busy) {
      $("btn-translate").disabled = busy;
      $("btn-download").disabled = busy;
      $("file-html").disabled = busy;
      $("manual-html").disabled = busy;
      $("btn-translate").textContent = busy ? "翻译中…" : "翻译";
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("读取 HTML 文件失败。"));
        reader.readAsText(file, "utf-8");
      });
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        if (file.name.toLowerCase().endsWith('.webarchive')) {
          const reader = new FileReader();
          reader.onload = () => {
            const arrayBuffer = reader.result;
            const uint8Array = new Uint8Array(arrayBuffer);
            let binaryString = '';
            for (let i = 0; i < uint8Array.length; i++) {
              binaryString += String.fromCharCode(uint8Array[i]);
            }
            const base64 = btoa(binaryString);
            resolve({ type: 'webarchive', content: base64 });
          };
          reader.onerror = () => reject(new Error("读取 WebArchive 文件失败。"));
          reader.readAsArrayBuffer(file);
        } else {
          const reader = new FileReader();
          reader.onload = () => resolve({ type: 'html', content: reader.result });
          reader.onerror = () => reject(new Error("读取 HTML 文件失败。"));
          reader.readAsText(file, "utf-8");
        }
      });
    }

    function showNotice(msg) {
      const n = $("notice");
      n.textContent = msg;
      n.classList.add("active");
    }

    function clearNotice() {
      $("notice").classList.remove("active");
    }

    function containsKorean(text) {
      return /[\u3131-\u318E\uAC00-\uD7A3]/.test(text);
    }

    async function postJSON(body) {
      const res = await fetch("/api/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) {
        throw new Error(data.error || `请求失败 (HTTP ${res.status})`);
      }
      return data;
    }

    async function translatePost() {
      const url = $("url").value.trim();
      const manualHtml = $("manual-html").value.trim();
      const fileInput = $("file-html");
      const file = fileInput.files && fileInput.files[0];
      if (!url && !manualHtml && !file) {
        showError("请输入 URL、手动输入韩文正文 或上传文件");
        return;
      }

      // Check file size to prevent HTTP 413
      if (file && file.size > 3 * 1024 * 1024) { // 3MB limit
        showError("文件太大，请选择小于 3MB 的文件");
        return;
      }

      clearError();
      clearNotice();
      $("output").value = "";
      $("progress").classList.add("active");
      setBusy(true);

      try {
        setProgress("抓取原文", 0, 1);
        let prep;

        if (file) {
          const fileData = await readFile(file);
          setProgress("解析文件内容", 0, 1);
          prep = await postJSON({ action: "prepare", fileData });
        } else if (manualHtml) {
          setProgress("处理输入文本", 0, 1);
          prep = await postJSON({ action: "prepare", text: manualHtml });
        } else {
          setProgress("获取网页内容", 0, 1);
          prep = await postJSON({ action: "prepare", url });
        }

        const chunks = prep.chunks || [];
        const total = chunks.length;

        if (total === 0) {
          throw new Error("正文为空");
        }

        setProgress("翻译中", 0, total);
        const parts = [];
        const fallbackChunks = [];

        for (let i = 0; i < total; i++) {
          const previous = parts.length ? parts[parts.length - 1] : "";
          setProgress(`翻译第 ${i + 1}/${total} 段`, i, total);
          const data = await postJSON({
            action: "translate",
            chunk: chunks[i],
            index: i + 1,
            total,
            previous,
          });
          parts.push(data.translated || "");
          if (data.fallback) {
            fallbackChunks.push(i + 1);
          }
          $("output").value = parts.join("\n\n");
          setProgress("翻译中", i + 1, total);
        }

        setProgress("完成", total, total);

        if (fallbackChunks.length > 0) {
          showNotice(`第 ${fallbackChunks.join(", ")} 段使用了备选翻译（机械翻译）`);
        }

        let text = $("output").value;
        if (containsKorean(text)) {
          setProgress("修正韩文残留", total, total);
          showNotice("检测到译文中仍包含韩文残留，正在尝试自动修正...");
          const fixData = await postJSON({ action: "fix", translated_text: text });
          if (fixData.fixed_text) {
            text = fixData.fixed_text;
            $("output").value = text;
          }

          if (containsKorean(text)) {
            showNotice("修正已尝试，但仍检测到韩文字符，请手动检查未翻译部分。");
          } else {
            showNotice("已自动修正剩余韩文字符，请检查译文是否完整。");
          }
        }
      } catch (err) {
        showError(err.message || String(err));
        $("progress-label").textContent = "失败";
      } finally {
        setBusy(false);
      }
    }

    function downloadTranslation() {
      const text = $("output").value.trim();
      if (!text) {
        showError("请先翻译，再导出。");
        return;
      }
      clearError();
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      const objUrl = URL.createObjectURL(blob);
      link.href = objUrl;
      link.download = "translated.txt";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(objUrl);
    }

    function switchTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      // Show selected tab
      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
      document.getElementById(`${tabName}-tab`).classList.add('active');
    }

    // Tab event listeners
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        switchTab(tab.dataset.tab);
      });
    });

    $("btn-translate").addEventListener("click", translatePost);
    $("btn-download").addEventListener("click", downloadTranslation);
    $("url").addEventListener("keydown", (e) => {
      if (e.key === "Enter") translatePost();
    });
  </script>
</body>
</html>
